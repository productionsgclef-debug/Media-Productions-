name: Project Health & Security Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight for routine maintenance

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 1.1.11

      - name: Set up Environment
        uses: actions/setup-node@v4 # Assumed Node.js; change if using Python/Java
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci # 1.1.8

      - name: Security Audit
        run: npm audit # Scans for known vulnerabilities in your libraries

      - name: Run Tests
        run: npm test # 1.1.11
