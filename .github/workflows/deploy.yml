name: Deploy to Free App Stores

on:
  push:
    tags:
      - 'v*' # Triggers only when you create a tag like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 1.1.2
      - name: set up JDK 17
        uses: actions/setup-java@v4 # 1.3.4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build & Sign Release APK
        run: ./gradlew assembleRelease # 1.1.3
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.KEYSTORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Step 1: Upload to Amazon Appstore
      - name: Upload to Amazon Appstore
        uses: AmeyaJain-25/amazon-appstore-app-upload@v1 # 1.4.5
        with:
          app-id: ${{ secrets.AMAZON_APP_ID }}
          client-id: ${{ secrets.AMAZON_CLIENT_ID }}
          client-secret: ${{ secrets.AMAZON_CLIENT_SECRET }}
          apk-file: app/build/outputs/apk/release/app-release.apk

      # Step 2: Upload to Aptoide (using their Uploader API)
      - name: Upload to Aptoide
        run: |
          curl -X POST "https://uploader.catappult.io/api" \
          -H "Authorization: Bearer ${{ secrets.APTOIDE_API_KEY }}" \
          -F "file=@app/build/outputs/apk/release/app-release.apk" # 1.5.8
